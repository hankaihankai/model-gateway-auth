apisix:
  node_listen: 9080
  enable_ipv6: false
  enable_admin: true
  admin_listen:
    ip: 0.0.0.0
    port: 9180

deployment:
  role: traditional
  role_traditional:
    config_provider: etcd
  admin:
    # 本地 Docker 部署时，宿主机访问会经过 Docker 网桥地址，放开 admin 访问白名单。
    allow_admin:
      - 0.0.0.0/0
    admin_key:
      - name: admin
        key: api-admin-key-1234567654321   # ← 改成你自己的 key
        role: admin
  etcd:
    host:
      - "http://etcd:2379"
    prefix: /apisix
    timeout: 30

plugin_attr:
  prometheus:
    export_uri: /apisix/prometheus/metrics
    enable_export_server: true
    export_addr:
      ip: 0.0.0.0
      port: 9091

# 注册自定义插件
