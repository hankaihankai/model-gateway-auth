services:
  model-gateway-auth:
    build:
      context: .
      dockerfile: Dockerfile
    image: model-gateway-auth:latest
    container_name: model-gateway-auth
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${AUTH_MYSQL_HOST:-host.docker.internal}:${AUTH_MYSQL_PORT:-3306}/${AUTH_MYSQL_DATABASE:-new_api}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${AUTH_MYSQL_USERNAME:-new_api}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_MYSQL_PASSWORD:-123456}
      SPRING_DATA_REDIS_HOST: ${AUTH_REDIS_HOST:-new-api-redis}
      SPRING_DATA_REDIS_PORT: ${AUTH_REDIS_PORT:-6379}
      SPRING_DATA_REDIS_PASSWORD: ${AUTH_REDIS_PASSWORD:-123456}
      GATEWAY_JWT_PRIVATE_KEY_FILE: ${GATEWAY_JWT_PRIVATE_KEY_FILE:-/app/cert/gateway-jwt-private.pem}
      GATEWAY_JWT_PUBLIC_KEY_FILE: ${GATEWAY_JWT_PUBLIC_KEY_FILE:-/app/cert/gateway-jwt-public.pem}
      GATEWAY_CREDENTIAL_KEY_ID: ${GATEWAY_CREDENTIAL_KEY_ID:-main}
      GATEWAY_CREDENTIAL_AES_KEY_FILE: ${GATEWAY_CREDENTIAL_AES_KEY_FILE:-/app/cert/gateway-credential-aes.key}
      APISIX_GATEWAY_SECRET_FILE: ${APISIX_GATEWAY_SECRET_FILE:-/app/cert/apisix-gateway-secret.txt}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${AUTH_PORT:-8080}:8080"
    volumes:
      - ./cert:/app/cert:ro
    networks:
      - new-api-network

networks:
  new-api-network:
    external: true
    name: ${AUTH_NEW_API_DOCKER_NETWORK:-new-api_default}
