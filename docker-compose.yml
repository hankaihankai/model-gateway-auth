services:
  model-gateway-auth:
    build:
      context: .
      dockerfile: Dockerfile
    image: model-gateway-auth:latest
    container_name: model-gateway-auth
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${AUTH_PORT:-8080}:8080"
    volumes:
      - ./cert:/app/cert:ro
    networks:
      - new-api-network

networks:
  new-api-network:
    external: true
    name: new-api-network
