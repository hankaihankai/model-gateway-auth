server:
  port: ${AUTH_PORT:8080}

spring:
  application:
    name: model-gateway-auth
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:user_manager}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:123456}
      database: ${REDIS_DATABASE:0}
      timeout: 3s

mybatis:
  configuration:
    map-underscore-to-camel-case: true

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 7200
  active-timeout: 7200
  auto-renew: true
  is-read-header: true
  is-read-cookie: false
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false

gateway:
  jwt:
    issuer: model-gateway-auth
    audience: apisix-llm-gateway
    expire-seconds: 7200
    private-key-file: ${GATEWAY_JWT_PRIVATE_KEY_FILE:}
    public-key-file: ${GATEWAY_JWT_PUBLIC_KEY_FILE:}
  credential:
    key-id: ${GATEWAY_CREDENTIAL_KEY_ID:main}
    aes-key-file: ${GATEWAY_CREDENTIAL_AES_KEY_FILE:}
    gateway-secret-file: ${APISIX_GATEWAY_SECRET_FILE:}
