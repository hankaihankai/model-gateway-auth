server:
  port: 8080

spring:
  application:
    name: model-gateway-auth
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/model_gateway?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 3s

mybatis:
  configuration:
    map-underscore-to-camel-case: true

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 7200
  active-timeout: 7200
  auto-renew: true
  is-read-header: true
  is-read-cookie: false
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false
